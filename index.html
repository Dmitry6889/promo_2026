<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dmitry Prostor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&family=Dancing+Script:wght@400..700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
</head>

<body class="bg-[#0E0E0E] font-family: Arial, Helvetica, sans-serif text-white font-bold">

  <!-- HEADER -->
  <header class="site-header sticky top-0 z-50 bg-[#0E0E0E]">
    <div class="container max-w-6xl mx-auto flex items-center justify-between p-4 ">

      <div class="header__logo  w-56 h-36 flex items-center overflow-hidden">
        <!-- <img src="./src/logo.png" alt="PROSTOR" class="w-full h-full object-cover"> -->
        <span class="font-['Cormorant',serif] text-4xl text-[#FFA31A]">Prostor</span>
      </div>

      <nav class="header__nav hidden md:flex gap-4 text-black">
        <div class="nav__item  px-4 py-2 rounded-lg bg-[#FFA31A]">Обо мне</div>
        <div class="nav__item  px-4 py-2 rounded-lg bg-[#FFA31A]">Предложения</div>
        <div class="nav__dropdown relative">
          <button id="contactsToggle" type="button" class="nav__item  px-4 py-2 rounded-lg bg-[#FFA31A] w-full text-left">
            Контакты
          </button>
          <div id="contactsDropdown" class="hidden absolute top-full left-0 mt-2 w-full min-w-[10rem] flex flex-col gap-2 p-2  rounded-lg bg-[#2B2B2B] z-10">
            <button type="button" class=" px-4 py-2 rounded-lg bg-[#FFA31A] hover:opacity-90">Telegram</button>
            <button type="button" class=" px-4 py-2 rounded-lg bg-[#FFA31A] hover:opacity-90">Email</button>
            <button type="button" class=" px-4 py-2 rounded-lg bg-[#FFA31A] hover:opacity-90">Телефон</button>
          </div>
        </div>
      </nav>

      <button id="burger" class="header__burger md:hidden w-10 h-10 flex flex-col items-center justify-center gap-1.5" aria-label="Открыть меню">
        <span class="block w-6 h-0.5 bg-[#FF9000]"></span>
        <span class="block w-6 h-0.5 bg-[#FF9000]"></span>
        <span class="block w-6 h-0.5 bg-[#FF9000]"></span>
      </button>

    </div>

    <div id="mobileMenu" class="mobile-menu hidden flex-col border-t border-white md:hidden">
      <div class="mobile-menu__item  p-3">Link</div>
      <div class="mobile-menu__item  p-3">Link</div>
      <div class="mobile-menu__item  p-3">Link</div>
    </div>
  </header>

  <!-- HERO -->
  <section class="section-hero ">
    <div class="hero container max-w-6xl mx-auto grid md:grid-cols-2 gap-4 p-6 bg-black-200">

      <div class="hero__content  p-6 flex flex-col gap-4 min-h-64 md:min-h-80 text-xl">
        <div class="hero__tag  flex-1 w-full p-4 flex items-center">Использовние современных и оптимальных технологий</div>
        <div class="hero__title  flex-1 w-full p-4 flex items-center">Подбор дизайна под ваши цели</div>
        <div class="hero__text  flex-1 w-full p-4 flex items-center">Стоимость строится на оценке реальных данных</div>
        <div class="hero__cta  flex-1 w-full p-4 flex items-center">Без навязываний не нужных вам услуг</div>
      </div>

      <div class="hero__media h-64 md:h-auto rounded-full m-auto ">
        <div class="hero__media  h-64 w-64 md:h-auto overflow-hidden rounded-full">
          <img src="./src/IMG_20240112_131000_041.jpg" alt="Фото героя" class="w-full h-full object-cover">
        </div>
      </div>

    </div>
  </section>

  <!-- FEATURES -->
  <section class="section-features ">
    <div class="features container max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-4">

      <div class="feature-card  h-40 overflow-hidden">
        <video class="w-full h-full object-cover" autoplay muted loop playsinline>
          <source src="./src/video/landings/landing_1.mp4" type="video/mp4">
        </video>
      </div>
      <div class="feature-card  h-40 overflow-hidden">
        <video class="w-full h-full object-cover" autoplay muted loop playsinline>
          <source src="./src/video/landings/landing_2.mp4" type="video/mp4">
        </video>
      </div>
      <div class="feature-card  h-40 overflow-hidden">
        <video class="w-full h-full object-cover" autoplay muted loop playsinline>
          <source src="./src/video/landings/landing_3.mp4" type="video/mp4">
        </video>
      </div>

    </div>
  </section>

  <!-- ABOUT -->
  <section class="section-about ">
    <div class="about container max-w-6xl mx-auto p-6 grid md:grid-cols-2 gap-4">

      <div class="about__media  h-64"></div>

      <div class="about__content  p-4 flex flex-col gap-3">
        <div class="about__title  h-6"></div>
        <div class="about__text  h-24"></div>
        <div class="about__button  h-10 w-32"></div>
      </div>

    </div>
  </section>

  <!-- CTA -->
  <section class="section-cta ">
    <div class="cta container max-w-6xl mx-auto p-6 flex flex-col items-center gap-4">

      <div class="cta__title  h-8 w-1/2"></div>
      <div class="cta__input  h-16 w-full"></div>
      <div class="cta__button  h-10 w-40"></div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer  bg-[#2B2B2B]">
    <div class="footer container max-w-6xl mx-auto p-6 grid md:grid-cols-4 gap-4">

      <div class="footer__col  h-20"></div>
      <div class="footer__col  h-20"></div>
      <div class="footer__col  h-20"></div>
      <div class="footer__col  h-20"></div>

    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
